gg:
  jte:
    development-mode: true

spring:
  application:
    name: quiz

  security:
    user:
      name: admin
      password: 123456

  threads:
    virtual:
      enabled: true

  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:2123} # Render mühitində PORT dəyişəni varsa onu istifadə et, yoxdursa 2123-ə keç
  servlet:
    session:
      timeout: 10000m

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY}
  model: claude-sonnet-4-20250514

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    root: INFO
    org.hibernate.orm.connections.pooling: OFF
    org.hibernate.orm.deprecation: OFF
    org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration: OFF