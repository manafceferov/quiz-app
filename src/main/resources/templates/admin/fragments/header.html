<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="">
    <meta name="author" content="">

    <title>Quiz Admin</title>

    <link th:href="@{/admin/sb-admin/vendor/fontawesome-free/css/all.min.css}" rel="stylesheet" type="text/css">
    <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i"
          rel="stylesheet">
    <link th:href="@{/admin/sb-admin/css/sb-admin-2.min.css}" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote-bs4.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/gitbrent/bootstrap4-toggle@3.6.1/css/bootstrap4-toggle.min.css"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/admin/sb-admin/css/costum.css}">

    <style>
        #accordionSidebar {
            display: flex !important;
            flex-direction: column !important;
            height: 100vh !important;
            overflow-y: auto !important;
            overflow-x: hidden !important;
            position: fixed !important;
            left: 0 !important;
            top: 0 !important;
            z-index: 1000 !important;
        }

        #accordionSidebar::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }

        #accordionSidebar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        #accordionSidebar #sidebarToggle {
            margin-top: auto !important;
        }

        .sidebar-card {
            display: none !important;
        }

        #accordionSidebar .sidebar-card,
        #accordionSidebar .card {
            display: none !important;
        }

        #content-wrapper {
            margin-left: 224px !important;
            transition: margin-left 0.3s ease;
        }

        body.sidebar-toggled #content-wrapper {
            margin-left: 6.5rem !important;
        }

        @media (max-width: 768px) {
            #content-wrapper {
                margin-left: 0 !important;
            }

            body.sidebar-toggled #content-wrapper {
                margin-left: 0 !important;
            }
        }
    </style>

</head>
