    <!-- SIDEBAR FIX CSS -->
    <style>
        /* Sidebar-ı flexbox olaraq təşkil et */
        #accordionSidebar {
            display: flex !important;
            flex-direction: column !important;
            height: 100vh !important;
            overflow-y: auto !important;
            overflow-x: hidden !important; /* Horizontal scroll-u gizlət */
            position: fixed !important; /* Sidebar həmişə sabit qalsın */
            left: 0 !important;
            top: 0 !important;
            z-index: 1000 !important;
        }

        /* Scrollbar-ı gizlət (bütün brauzerlər üçün) */
        #accordionSidebar::-webkit-scrollbar {
            width: 0px;
            height: 0px;
            background: transparent;
        }

        #accordionSidebar {
            -ms-overflow-style: none;  /* IE və Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* Toggle düyməsi üçün sticky position */
        #accordionSidebar #sidebarToggle {
            margin-top: auto !important;
        }

        /* Sidebar message/card-ı gizlət */
        .sidebar-card {
            display: none !important;
        }

        /* Sidebar-dəki bütün reklam elementlərini gizlət */
        #accordionSidebar .sidebar-card,
        #accordionSidebar .card {
            display: none !important;
        }

        /* Content-in sidebar ilə düzgün işləməsi üçün */
        #content-wrapper {
            margin-left: 224px !important; /* Default - sidebar açıq */
            transition: margin-left 0.3s ease;
        }

        /* Sidebar kiçildikdə content-in tam genişlikdə olması */
        body.sidebar-toggled #content-wrapper {
            margin-left: 6.5rem !important; /* Kiçildilmiş sidebar width */
        }

        /* Mobil üçün düzəliş */
        @media (max-width: 768px) {
            #content-wrapper {
                margin-left: 0 !important;
            }

            body.sidebar-toggled #content-wrapper {
                margin-left: 0 !important;
            }
        }
    </style>

</head>
