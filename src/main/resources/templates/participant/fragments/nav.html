                </li>

                <li class="nav-item" sec:authorize="hasRole('PARTICIPANT')">

                </li>

                <li class="nav-item" sec:authorize="hasRole('PARTICIPANT')">
                    <a class="nav-link" th:href="@{/participant/topics}" data-path="/participant/topics">Mövzular</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('PARTICIPANT')">
                    <a class="nav-link" th:href="@{/participant/ai-quiz}" data-path="/participant/ai-quiz">
                        <i class="fas fa-robot"></i> AI Quiz
                    </a>

                <li class="nav-item ms-3">
                    <button id="darkModeToggle" class="btn btn-secondary btn-sm" type="button">🌑</button>

                    <div class="dropdown">
                        <a href="#"
                           class="d-block text-decoration-none"
                           id="profileDropdown"
                           data-bs-toggle="dropdown"
                           aria-expanded="false">

                            <img th:if="${participant.attachment != null && participant.attachment.fileUrl != null}"
                                 th:src="@{${participant.attachment.fileUrl}}"

                                 class="rounded-circle profile-avatar"
                                 style="width: 40px; height: 40px; object-fit: cover; border: 2px solid #fff;">

                            <div th:if="${participant.attachment == null || participant.attachment.fileUrl == null}"

                                 style="width: 40px; height: 40px; font-size: 18px; font-weight: bold; border: 2px solid #fff;">

<style>
    .profile-avatar {
        cursor: pointer;
        transition: transform 0.2s ease;
    }

    .profile-avatar:hover {
        transform: scale(1.1);
    }

    .dropdown-menu {
        min-width: 180px;
        border-radius: 8px;
        padding: 0.5rem 0;
    }

    .dropdown-item {
        padding: 10px 20px;
        font-size: 14px;
        transition: background-color 0.2s;
    }

    body:not(.dark-mode) .dropdown-menu {
        background-color: #ffffff;
        border: 1px solid #dee2e6;
    }

    body:not(.dark-mode) .dropdown-item {
        color: #212529;
    }

    body:not(.dark-mode) .dropdown-item:hover {
        background-color: #f8f9fa;
    }

    body:not(.dark-mode) .dropdown-divider {
        border-color: #dee2e6;
    }

    body.dark-mode .dropdown-menu {
        background-color: #343a40;
        border: 1px solid #495057;
    }

    body.dark-mode .dropdown-item {
        color: #ffffff !important;
    }

    body.dark-mode .dropdown-item:hover {
        background-color: #495057;
    }

    body.dark-mode .dropdown-divider {
        border-color: #495057;
    }

    body:not(.dark-mode) .dropdown-item.text-danger {
        color: #dc3545 !important;
    }

    body.dark-mode .dropdown-item.text-danger {
        color: #dc3545 !important;
    }

    .dropdown-item.text-danger:hover {
        background-color: rgba(220, 53, 69, 0.1) !important;
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll('.navbar-nav .nav-link[data-path]');
        navLinks.forEach(link => {
            if (link.getAttribute('data-path') === currentPath) {
                link.classList.add('active');
            }
        });
    });
</script>
