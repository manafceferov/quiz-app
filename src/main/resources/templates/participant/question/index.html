<th:block th:replace="~{participant/fragments/header}"></th:block>

<style>
    .search-wrapper {
        max-width: 500px;
        margin: 0 auto;
    }

    body:not(.dark-mode) input.form-control::placeholder {
        color: #6c757d !important;
        opacity: 1;
    }

    body.dark-mode input.form-control::placeholder {
        color: #ffffff !important;
        opacity: 1;
    }
</style>

<div class="px-4 mt-4 w-100">
    <div class="alert alert-success shadow border border-success text-center" th:if="${success}">
        <i class="fa fa-check mr-2"></i> [[${success}]]
    </div>

    <div class="search-wrapper mb-4">
        <form th:action="@{/participant/questions/topic/{topicId}(topicId=${topicId})}"
              method="get"
              class="d-flex">

            <input type="text"
                   name="keyword"
                   class="form-control"
                   placeholder="Sual mətni ilə axtar"
                   th:value="${keyword}"/>

            <button type="submit" class="btn btn-primary ms-2">
                Axtar
            </button>

            <a th:href="@{/participant/questions/topic/{topicId}(topicId=${topicId})}"
               class="btn btn-outline-warning ms-2">
                Sıfırla
            </a>

        </form>
    </div>

    <div class="card shadow mb-4 w-100">
        <div class="card-header d-flex justify-content-between align-items-center bg-dark text-white">
            <h5 class="m-0">Sual Siyahısı</h5>
            <div>
                <th:block th:if="${topic.byParticipant == currentParticipantId}">
                    <a th:href="@{/participant/questions/topic/{topicId}/create(topicId=${topicId})}"
                       class="btn btn-success me-2">Əlavə Et</a>
                </th:block>
                <a th:href="@{/participant/topics}" class="btn btn-secondary">Geri</a>
            </div>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered text-center table-hover align-middle">
                    <thead class="thead-dark">
                    <tr>
                        <th style="width: 5%">No</th>
                        <th style="width: 55%">Sual</th>
                        <th style="width: 20%">Tarix</th>
                        <th style="width: 20%">Əməliyyatlar</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="question, stat : ${questions}">
                        <td>
                            <div class="badge badge-pill badge-dark">[[${stat.count}]]</div>
                        </td>
                        <td th:utext="${question.question}"></td>
                        <td th:text="${@diffForHumans.getTime(question.createdAt)}"></td>
                        <td class="align-middle">
                            <th:block th:if="${question.byParticipant == currentParticipantId}">
                                <a th:href="@{/participant/questions/{id}/edit(id=${question.id})}"
                                   class="btn btn-info btn-sm btn-circle"
                                   data-bs-toggle="tooltip" data-bs-placement="top" title="Düzəliş">
                                    <i class="fas fa-pencil-alt"></i>
                                </a>
                                <a href="#"
                                   th:data-url="@{/participant/questions/{id}/delete(id=${question.id}, topicId=${topicId})}"
                                   class="btn btn-danger btn-sm btn-circle delete-btn"
                                   data-bs-toggle="tooltip" data-bs-placement="top" title="Sil">
                                    <i class="far fa-trash-alt"></i>
                                </a>
                                <form th:action="@{/participant/questions/change-status/question/{id}/status/{status}(id=${question.id}, status=${question.isActive ? 0 : 1})}"
                                      method="GET" class="d-inline-block m-0 p-0">
                                    <input type="hidden" name="topicId" th:value="${topicId}"/>
                                    <input type="checkbox" th:checked="${question.isActive}"
                                           data-toggle="toggle"
                                           data-onstyle="success"
                                           data-offstyle="danger"
                                           data-size="sm"
                                           data-on="<i class='fas fa-check'></i> On"
                                           data-off="<i class='fas fa-times'></i> Off"
                                           data-bs-toggle="tooltip"
                                           th:attr="title=${question.isActive} ? 'Aktiv' : 'Passiv'"
                                           onchange="this.form.submit()"/>
                                </form>
                            </th:block>
                            <th:block th:unless="${question.byParticipant == currentParticipantId}">
                                <span>İcazəniz yoxdur</span>
                            </th:block>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <div th:replace="~{participant/fragments/pagination :: paginationFragment(${questions}, '/participant/questions/topic/' + ${topicId})}"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" data-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-danger">
            <div class="modal-header">
                <h5 class="modal-title text-danger">Silinsin?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">Bu qeydi silmək istədiyinizə əminsiniz?</div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Çıx</button>
                <button type="button" class="btn btn-danger" id="modal-confirm_delete">Sil</button>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => $(".alert").hide(2000), 3000);

        $('[data-toggle="toggle"]').bootstrapToggle({
            on: '<i class="fas fa-check"></i> On',
            off: '<i class="fas fa-times"></i> Off',
            onstyle: 'success',
            offstyle: 'danger'
        });

        $('.delete-btn').on('click', e => {
            e.preventDefault();
            $('#modal-confirm_delete').data('url', e.currentTarget.dataset.url);
            $('#deleteModal').modal('show');
        });

        $('#modal-confirm_delete').on('click', () => {
            window.location.href = $('#modal-confirm_delete').data('url');
        });

        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'));
        const tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
            return new bootstrap.Tooltip(tooltipTriggerEl)
        });
    });
</script>

<th:block th:replace="~{participant/fragments/footer}"></th:block>
